<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="instaLoginPage.css">
    <title>Insta Login Page</title>
</head>
<body>
    <main>
        <section class="firstContainer">
            <div >
                <span class="line">See everyday moments from </span><br> <span class="line"> your </span>  <span class="changeColor">close friends.</span>
            </div>

            <div>
                <img src="https://static.cdninstagram.com/rsrc.php/yJ/r/53X3pk-t2Gn.webp" alt="imgage" class="img">
            </div>
        </section>

        <section class="secondContainer">
            <div>
                <h3 class="heading">Log into Instagram </h3>
            </div>
            
            <div class="inputConatainer">
                <input class="email" type="text" placeholder="Mobile number, username or email">
                <input class="pass" type="password" placeholder="Password">
            </div>

            <div class="btnContainer">
                <button class="log">Log in</button>
                <button class="forgot">Forgot password?</button>
            </div>

            <div class="buttonContainer">
                <button class="facebook">Log in with Facebook</button>
                <button class="create">Create new account</button>
            </div>
        </section>
    </main>
</body>
</html>
