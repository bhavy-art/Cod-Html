<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact me page</title>
</head>
<body>
    <form>
        <h3>Enter your details</h3>
        <label>Name:</label>
        <input type="text" placeholder="Full name"><br><br>

        <label>Email:</label>
        <input type="email" placeholder="Email Address"><br><br>

        <label>Contact number</label>
        <input type="number" placeholder="Phone number"><br><br>

        <label>Tittle</label>
        <input type="text" placeholder="Project tittle"><br><br>

        <select>
            <option>Select Project type</option>
            <option>Portfolio website</option>
            <option>E-commerce website</option>
            <option>Web applications</option>
        </select><br><br>

        <textarea placeholder="Description of your project"></textarea><br><br>

        <label>Project Budget</label>
        <input type="number" placeholder="Budget"><br><br>

        <textarea placeholder="Additionals Requirements"></textarea><br><br>

        <button type="submit">Submit</button>

    </form>
</body>
</html>
