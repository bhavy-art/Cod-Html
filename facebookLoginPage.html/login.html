<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="login.css">
    <title>Login Page</title>
</head>
<body>
    <main>
        <section class="container1">
            <div>
                <img class="img" src="https://static.xx.fbcdn.net/rsrc.php/yb/r/HpEiFYDux5j.webp" alt="img">
            </div>

             <div class="line">
                <p>Explore the things <span class="changeColor">you love.</span></p>
            </div>
        </section>

        <section class="container2">
            <h3 class="heading">Log in to Facebook</h3>
            <div class="inputConatainer">
                <input class="email" type="text" placeholder="Email address or mobile number">
                <input class="password" type="password" placeholder="Password">
            </div>

            <div class="buttonContainer">
                <button class="log">Log in</button>
                <button class="forgot">Forgotten password?</button>
            </div>

            <div class="btnContainer">
                <button class="create">Create new account</button>
            </div>
        </section>
    </main>
</body>
</html>
